<svg width="100%" viewBox="0 0 700 400" role="img" xmlns="http://www.w3.org/2000/svg" font-family='"Anthropic Sans", -apple-system, "system-ui", "Segoe UI", sans-serif'><style>.t{font-size:15px;font-weight:500}.ts{font-size:12.5px;font-weight:400}.lbl{font-size:15px;font-weight:600}.cap{font-size:12.5px;font-weight:400}.muted{fill:#6B6A64}@media (prefers-color-scheme:dark){.muted{fill:#A8A69E}.dyn{fill:#E4E2D8}}</style><defs><marker id="ar" viewBox="0 0 10 10" refX="7" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M1 1L8 5L1 9" fill="none" stroke="#8A8A82" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs><rect x="40" y="40" width="620" height="92" rx="16" fill="#FAEEDA" stroke="#E3B96B" stroke-width="1.3"/><text x="62" y="70" class="t" fill="#633806">Extract</text><text x="62" y="90" class="ts" fill="#854F0B">pull records out of a source; field-level scrub may happen here</text><rect x="60" y="96" width="300" height="24" rx="7" fill="#FAEEDA" stroke="#E3B96B" stroke-width="1.3"/><text x="210.0" y="108.0" text-anchor="middle" class="t" fill="#633806" dominant-baseline="central">Scrub: mask, tokenize, pseudonymize</text><rect x="375" y="96" width="265" height="24" rx="7" fill="#FAEEDA" stroke="#E3B96B" stroke-width="1.3"/><text x="507.5" y="108.0" text-anchor="middle" class="t" fill="#633806" dominant-baseline="central">No new meaning, a handling policy</text><rect x="40" y="156" width="620" height="64" rx="16" fill="#E6F1FB" stroke="#6FA8DC" stroke-width="1.3"/><text x="62" y="186" class="t" fill="#0C447C">Load</text><text x="62" y="206" class="ts" fill="#185FA5">write records into a destination as-is; no logic, no derivation</text><rect x="40" y="248" width="620" height="132" rx="16" fill="#EEEDFE" stroke="#9B92D8" stroke-width="1.3"/><text x="62" y="278" class="t" fill="#3C3489">Transform</text><text x="62" y="298" class="ts" fill="#534AB7">produce meaning that did not exist in the raw layer</text><rect x="60" y="308" width="270" height="52" rx="8" fill="#EEEDFE" stroke="#9B92D8" stroke-width="1.3"/><text x="195" y="326" text-anchor="middle" class="ts" fill="#3C3489">Joins, revenue logic, rolling</text><text x="195" y="344" text-anchor="middle" class="ts" fill="#3C3489">averages, SCD resolution</text><rect x="345" y="308" width="295" height="52" rx="8" fill="#FCEBEB" stroke="#E29A9A" stroke-width="1.3"/><text x="492" y="326" text-anchor="middle" class="ts" fill="#791F1F">Irreversible if the source is lost</text><text x="492" y="344" text-anchor="middle" class="ts" fill="#791F1F">the operation that needs raw</text></svg>