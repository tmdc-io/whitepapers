<svg width="100%" viewBox="0 0 700 300" role="img" xmlns="http://www.w3.org/2000/svg" font-family='"Anthropic Sans", -apple-system, "system-ui", "Segoe UI", sans-serif'><style>.t{font-size:15px;font-weight:500}.ts{font-size:12.5px;font-weight:400}.lbl{font-size:15px;font-weight:600}.cap{font-size:12.5px;font-weight:400}.muted{fill:#6B6A64}@media (prefers-color-scheme:dark){.muted{fill:#A8A69E}.dyn{fill:#E4E2D8}}</style><defs><marker id="ar" viewBox="0 0 10 10" refX="7" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M1 1L8 5L1 9" fill="none" stroke="#8A8A82" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs><rect x="250" y="30" width="200" height="52" rx="11" fill="#EEEDFE" stroke="#9B92D8" stroke-width="1.3"/><text x="350.0" y="48.0" text-anchor="middle" class="t" fill="#3C3489" dominant-baseline="central">Transform</text><text x="350.0" y="66.0" text-anchor="middle" class="ts" fill="#534AB7" dominant-baseline="central">tables, MVs, views; changes often</text><rect x="60" y="140" width="180" height="52" rx="11" fill="#E6F1FB" stroke="#6FA8DC" stroke-width="1.3"/><text x="150.0" y="158.0" text-anchor="middle" class="t" fill="#0C447C" dominant-baseline="central">Catalog</text><text x="150.0" y="176.0" text-anchor="middle" class="ts" fill="#185FA5" dominant-baseline="central">Alation / Collibra</text><line x1="150.0" y1="192" x2="350" y2="228" stroke="#8A8A82" stroke-width="1.5" stroke-dasharray="3 3" marker-end="url(#ar)"/><rect x="260" y="140" width="200" height="52" rx="11" fill="#E6F1FB" stroke="#6FA8DC" stroke-width="1.3"/><text x="360.0" y="158.0" text-anchor="middle" class="t" fill="#0C447C" dominant-baseline="central">Quality + observability</text><text x="360.0" y="176.0" text-anchor="middle" class="ts" fill="#185FA5" dominant-baseline="central">Monte Carlo</text><line x1="360.0" y1="192" x2="350" y2="228" stroke="#8A8A82" stroke-width="1.5" stroke-dasharray="3 3" marker-end="url(#ar)"/><rect